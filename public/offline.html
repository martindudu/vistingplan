<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0a0a0c" />
    <title>離線模式 | 旅遊建築師</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0a0a0c;
        --panel: rgba(255, 255, 255, 0.06);
        --border: rgba(255, 255, 255, 0.12);
        --text: #ffffff;
        --muted: rgba(255, 255, 255, 0.64);
        --accent: #3b82f6;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100dvh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
        background:
          linear-gradient(135deg, rgba(59, 130, 246, 0.16), transparent 42%),
          linear-gradient(180deg, rgba(255, 255, 255, 0.05), transparent 34%),
          var(--bg);
        color: var(--text);
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        width: min(520px, 100%);
        border: 1px solid var(--border);
        border-radius: 18px;
        background: rgba(10, 10, 12, 0.86);
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.42);
        padding: 28px;
      }

      img {
        width: 56px;
        height: 56px;
        margin-bottom: 24px;
      }

      h1 {
        margin: 0 0 10px;
        font-size: clamp(1.8rem, 8vw, 3rem);
        line-height: 0.95;
      }

      p {
        margin: 0 0 22px;
        color: var(--muted);
        line-height: 1.7;
      }

      ul {
        display: grid;
        gap: 10px;
        margin: 0 0 24px;
        padding: 0;
        list-style: none;
      }

      li {
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 12px 14px;
        background: var(--panel);
        color: var(--muted);
        font-size: 0.94rem;
      }

      a,
      button {
        width: 100%;
        min-height: 48px;
        border: 0;
        border-radius: 12px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        background: var(--accent);
        color: #fff;
        cursor: pointer;
        font: inherit;
        font-weight: 800;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main>
      <img src="/icon.svg" alt="" />
      <h1>目前離線</h1>
      <p>已保存的行程仍會留在這台裝置。重新連線後，地圖、搜尋、天氣與路線時間會恢復更新。</p>
      <ul>
        <li>可回到主畫面查看上次保存的行程。</li>
        <li>Google 地圖與街景需要網路連線。</li>
        <li>若剛剛更新過行程，請回到有網路時再重新整理。</li>
      </ul>
      <a href="/">回到行程</a>
    </main>
  </body>
</html>
